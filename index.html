<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer Reading · Nichols School · Mr. Powers</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0f1520;color:#f0e8d8;min-height:100vh}
.app{max-width:900px;margin:0 auto;padding:1.5rem 1rem}
h1{font-family:'Playfair Display',serif;font-size:2rem;font-weight:600;color:#f0e8d8;letter-spacing:-0.02em}
h2{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:400;color:#c9b99a;margin-bottom:1rem}
h3{font-size:0.95rem;font-weight:500;color:#f0e8d8}
.nav{display:flex;gap:4px;margin:1.5rem 0;border-bottom:1px solid #2a3245;padding-bottom:0}
.nav-btn{background:none;border:none;color:#8a9ab5;font-family:'Inter',sans-serif;font-size:0.85rem;font-weight:500;padding:0.6rem 1.1rem;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 0.15s}
.nav-btn.active{color:#e8c47a;border-bottom-color:#e8c47a}
.nav-btn:hover{color:#f0e8d8}
.card{background:#1a2235;border:1px solid #2a3245;border-radius:12px;padding:1.25rem;margin-bottom:1rem;position:relative}
.card-spine{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:12px 0 0 12px}
.spine-absorbed{background:#4a9eff}
.spine-pushing{background:#e8c47a}
.spine-switching{background:#ff7c5c}
.form-group{margin-bottom:1rem}
label{display:block;font-size:0.8rem;font-weight:500;color:#8a9ab5;margin-bottom:0.35rem;text-transform:uppercase;letter-spacing:0.05em}
input,textarea,select{width:100%;background:#0f1520;border:1px solid #2a3245;border-radius:8px;padding:0.65rem 0.85rem;color:#f0e8d8;font-family:'Inter',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.15s}
input:focus,textarea:focus,select:focus{border-color:#e8c47a}
textarea{resize:vertical;min-height:90px;line-height:1.6}
select option{background:#1a2235}
.btn{display:inline-flex;align-items:center;gap:6px;padding:0.6rem 1.2rem;border-radius:8px;font-family:'Inter',sans-serif;font-size:0.85rem;font-weight:500;cursor:pointer;transition:all 0.15s;border:none}
.btn-primary{background:#e8c47a;color:#0f1520}
.btn-primary:hover{background:#f0d08a}
.btn-primary:disabled{background:#3a4255;color:#5a6275;cursor:not-allowed}
.btn-secondary{background:transparent;border:1px solid #2a3245;color:#8a9ab5}
.btn-secondary:hover{border-color:#4a5265;color:#f0e8d8}
.mood-pill{display:inline-flex;align-items:center;gap:5px;padding:0.3rem 0.75rem;border-radius:20px;font-size:0.78rem;font-weight:500}
.mood-absorbed{background:#0c2a4a;color:#4a9eff}
.mood-pushing{background:#2a2010;color:#e8c47a}
.mood-switching{background:#2a1510;color:#ff7c5c}
.wall-grid{display:flex;flex-direction:column;gap:0.75rem}
.post-name{font-size:0.8rem;color:#8a9ab5;margin-bottom:2px}
.post-book{font-size:1rem;font-weight:500;color:#f0e8d8;margin-bottom:4px}
.post-vibe{font-size:0.9rem;color:#c9b99a;font-style:italic;margin-bottom:0.5rem;line-height:1.5}
.post-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.post-date{font-size:0.75rem;color:#5a6275}
.thread{display:flex;flex-direction:column;gap:0.75rem;margin-bottom:1rem}
.msg{padding:0.85rem 1rem;border-radius:10px;max-width:88%;font-size:0.9rem;line-height:1.6}
.msg-student{background:#1a2235;border:1px solid #2a3245;align-self:flex-start;color:#c9b99a}
.msg-teacher{background:#1a2e1a;border:1px solid #2a4235;align-self:flex-end;color:#a8d4a8}
.msg-label{font-size:0.72rem;font-weight:500;color:#5a6275;margin-bottom:4px}
.dash-row{display:flex;align-items:center;gap:10px;padding:0.7rem 0.5rem;border-bottom:1px solid #1a2235;cursor:pointer;transition:background 0.1s;border-radius:6px}
.dash-row:hover{background:#1a2235}
.dash-name{font-size:0.9rem;font-weight:500;flex:1;color:#f0e8d8}
.dash-email{font-size:0.8rem;color:#5a6275;flex:1.5}
.dash-date{font-size:0.78rem;color:#8a9ab5;flex:1}
.status-badge{font-size:0.72rem;font-weight:500;padding:0.25rem 0.6rem;border-radius:20px;white-space:nowrap}
.status-current{background:#0c2a1a;color:#4adb8a}
.status-overdue{background:#2a1a0c;color:#e8a42a}
.status-never{background:#2a1010;color:#ff7c5c}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.stat{background:#1a2235;border:1px solid #2a3245;border-radius:10px;padding:1rem;text-align:center}
.stat-n{font-size:1.6rem;font-weight:600;font-family:'Playfair Display',serif;color:#e8c47a}
.stat-l{font-size:0.75rem;color:#8a9ab5;margin-top:2px}
.lock{min-height:60vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
.lock h2{font-family:'Playfair Display',serif;font-size:1.5rem;color:#c9b99a;text-align:center}
.lock input{max-width:240px}
.followup-box{background:#2a2010;border:1px solid rgba(232,196,122,0.2);border-radius:10px;padding:1rem;margin-bottom:1rem}
.followup-label{font-size:0.78rem;color:#e8c47a;font-weight:500;margin-bottom:0.5rem}
.spinner{width:18px;height:18px;border:2px solid #3a4255;border-top-color:#e8c47a;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;color:#5a6275;padding:3rem 1rem;font-style:italic}
.header-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:0.75rem}
.tagline{font-size:0.85rem;color:#8a9ab5;margin-top:4px}
.starter-btn{background:#1a2235;border:1px solid #2a3245;border-radius:20px;color:#8a9ab5;font-family:'Inter',sans-serif;font-size:0.75rem;padding:0.35rem 0.75rem;cursor:pointer;transition:all 0.15s;text-align:left;line-height:1.4}.starter-btn:hover{border-color:#e8c47a;color:#e8c47a;background:#2a2010}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}.dash-email{display:none}}
</style>
</head>
<body>
<div class="app" id="root">
  <div class="header-row">
    <div>
      <h1>📚 Summer Reading</h1>
      <div class="tagline">Nichols School · Rising 8th Grade · Mr. Powers</div>
    </div>
    <div id="teacher-status"></div>
  </div>
  <div class="nav" id="nav"></div>
  <div id="main"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, get, push, onValue, update } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCuxxzSagf0exk3MmgRWCXqCIMFt9LXW2M",
  authDomain: "nichols-reading.firebaseapp.com",
  databaseURL: "https://nichols-reading-default-rtdb.firebaseio.com",
  projectId: "nichols-reading",
  storageBucket: "nichols-reading.firebasestorage.app",
  messagingSenderId: "273653133994",
  appId: "1:273653133994:web:f24aa3df0620e20ef956d3"
};

const TEACHER_PASS = "powers2026";

const fbApp = initializeApp(FIREBASE_CONFIG);
const db = getDatabase(fbApp);

function fmt(iso){ return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function daysSince(iso){ return Math.floor((Date.now()-new Date(iso))/86400000); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function emailKey(e){ return e.replace(/\./g,'_').replace(/@/g,'__at__'); }
function keyToEmail(k){ return k.replace(/__at__/g,'@').replace(/_/g,'.'); }
function getStatus(s){
  if(!s||!s.lastCheckin) return 'never';
  const d=daysSince(s.lastCheckin);
  if(d<=32) return 'current';
  if(d<=50) return 'overdue';
  return 'never';
}

const state = {
  tab:'wall', teacherLocked:true, viewingStudent:null,
  currentUser: JSON.parse(localStorage.getItem('sr_user')||'null'),
  posts:[], students:{}, journals:{}, followups:{},
  pendingFollowup: null,
  journalDue: false,
  hasUnreadReply: false
};

async function checkUnreadReply(email){
  if(!email) return;
  const key=emailKey(email);
  const snap=await get(ref(db,'students/'+key));
  const lastRead=snap.exists()?(snap.val().lastJournalRead||0):0;
  const jSnap=await get(ref(db,'journals/'+key));
  if(!jSnap.exists()){ state.hasUnreadReply=false; return; }
  const msgs=Object.values(jSnap.val());
  const hasNew=msgs.some(m=>m.role==='teacher'&&new Date(m.date).getTime()>lastRead);
  state.hasUnreadReply=hasNew;
}

function startListeners(){
  onValue(ref(db,'posts'), snap=>{
    const raw=snap.val()||{};
    state.posts=Object.values(raw).sort((a,b)=>new Date(b.date)-new Date(a.date));
    if(state.tab==='wall') renderMain();
  });
  onValue(ref(db,'students'), snap=>{
    const raw=snap.val()||{};
    state.students={};
    Object.entries(raw).forEach(([k,v])=>{ state.students[keyToEmail(k)]={...v,email:keyToEmail(k)}; });
    if(state.tab==='teacher') renderMain();
  });
  onValue(ref(db,'journals'), snap=>{
    state.journals=snap.val()||{};
    // Re-check unread replies when journal data updates
    if(state.currentUser&&state.tab!=='journal'){
      checkUnreadReply(state.currentUser.email).then(()=>renderMain());
    } else if(state.tab==='journal'||state.viewingStudent) renderMain();
  });
  onValue(ref(db,'followups'), snap=>{
    state.followups=snap.val()||{};
    if(state.tab==='checkin'||state.tab==='teacher'||state.viewingStudent) renderMain();
  });
}

async function dbSet(path,val){ await set(ref(db,path),val); }
async function dbUpdate(path,val){ await update(ref(db,path),val); }
async function dbPush(path,val){ await push(ref(db,path),val); }

async function callClaude(prompt,system){
  try {
    const r=await fetch('https://nichols-reading-proxy.gpowers.workers.dev',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:300,system:system||'You are a warm middle school English teacher.',messages:[{role:'user',content:prompt}]})
    });
    const d=await r.json();
    return d.content&&d.content[0]?d.content[0].text:null;
  } catch(e){ return null; }
}

function renderWall(){
  // Inline follow-up card shown immediately after posting
  let followupCard='';
  if(state.pendingFollowup){
    const pf=state.pendingFollowup;
    followupCard='<div style="background:#2a2010;border:2px solid #e8c47a;border-radius:12px;padding:1.25rem;margin-bottom:1.25rem">'
      +'<div style="font-size:0.78rem;font-weight:500;color:#e8c47a;margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.05em">⚡ Mr. Powers wants to know…</div>'
      +'<div style="font-size:0.95rem;color:#f0e8d8;margin-bottom:0.85rem;line-height:1.6">'+esc(pf.question)+'</div>'
      +'<div class="form-group"><textarea id="pf-answer" style="min-height:80px" placeholder="Answer here before your next check-in..."></textarea></div>'
      +'<div style="display:flex;gap:8px">'
      +'<button class="btn btn-primary" onclick="window._submitPendingFollowup()">Submit answer</button>'
      +'<button class="btn btn-secondary" onclick="window._dismissFollowup()">Answer later</button>'
      +'</div>'
      +'</div>';
  }
  const cards=state.posts.length
    ? state.posts.map(p=>{
        const spineClass=p.mood==='love'?'spine-absorbed':p.mood==='good'?'spine-absorbed':p.mood==='ok'?'spine-pushing':'spine-switching';
        const pillClass=p.mood==='love'?'mood-absorbed':p.mood==='good'?'mood-absorbed':p.mood==='ok'?'mood-pushing':'mood-switching';
        const pillLabel=p.mood==='love'?'🔥 Love it!':p.mood==='good'?'😄 It\'s good':p.mood==='ok'?'😐 It\'s ok':'💤 Need a new book';
        return '<div class="card" style="padding-left:1.5rem">'
          +'<div class="card-spine '+spineClass+'"></div>'
          +'<div class="post-name">'+esc(p.name)+'</div>'
          +'<div class="post-book">'+esc(p.book)+'</div>'
          +'<div class="post-vibe">'+esc(p.vibe)+'"</div>'
          +'<div class="post-meta">'
          +'<span class="mood-pill '+pillClass+'">'+pillLabel+'</span>'
          +'<span class="post-date">'+fmt(p.date)+'</span>'
          +'</div></div>';
      }).join('')
    : '<div class="empty">No posts yet — be the first to share what you\'re reading.</div>';

  const replyBanner=state.hasUnreadReply&&state.currentUser
    ? '<div style="background:#1a2235;border:2px solid #4a9eff;border-radius:12px;padding:1rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.75rem">'
      +'<div style="font-size:0.88rem;color:#a8d4ff;line-height:1.5"><strong style="color:#4a9eff">💬 Mr. Powers replied to your journal</strong><br>You have a new message waiting.</div>'
      +'<button class="btn" style="background:#4a9eff;color:#0f1520" onclick="setTab(\'journal\')">Read reply</button>'
      +'</div>'
    : '';
  const journalNudge=state.journalDue
    ? '<div style="background:#1a2e1a;border:2px solid #4adb8a;border-radius:12px;padding:1rem;margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.75rem">'
      +'<div style="font-size:0.88rem;color:#a8d4a8;line-height:1.5"><strong style="color:#4adb8a">✏️ Journal entry due</strong><br>You\'ve done two check-ins — write a few sentences to Mr. Powers.</div>'
      +'<button class="btn btn-primary" style="background:#4adb8a;color:#0f1520" onclick="setTab(\'journal\')">Write journal entry</button>'
      +'</div>'
    : '';
  return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;gap:0.5rem">'    +'<h2 style="margin:0">What we\'re reading</h2>'    +'<button class="btn btn-primary" onclick="setTab(\'checkin\')">Post an update</button>'    +'</div>'    +replyBanner    +journalNudge    +followupCard    +'<div class="wall-grid">'+cards+'</div>';
}

function renderCheckin(){
  if(!state.currentUser){
    return '<h2>Post an update</h2>'
      +'<div class="card">'
      +'<p style="color:#8a9ab5;font-size:0.85rem;margin-bottom:1rem">Your name appears on the reading wall. Your email is just for Mr. Powers.</p>'
      +'<div class="form-group"><label>First name + last initial</label><input id="fi-name" placeholder="e.g. Jordan K."></div>'
      +'<div class="form-group"><label>School email</label><input id="fi-email" type="email" placeholder="you@nicholsschool.org"></div>'
      +'<button class="btn btn-primary" onclick="window._signIn()">Continue</button>'
      +'</div>';
  }
  const fuKey=emailKey(state.currentUser.email);
  const fu=state.followups[fuKey]||null;
  let body='';
  if(fu&&!fu.answered){
    body='<div class="followup-box">'
      +'<div class="followup-label">⚡ Answer this before your next update</div>'
      +'<div style="font-size:0.9rem;color:#f0e8d8;margin-bottom:0.75rem">'+esc(fu.question)+'</div>'
      +'<div class="form-group"><textarea id="fu-answer" placeholder="Your answer — be specific!"></textarea></div>'
      +'<button class="btn btn-primary" onclick="window._submitFollowup()">Submit answer</button>'
      +'</div>';
  } else {
    body='<div class="card">'
      +'<div class="form-group"><label>Book title</label><input id="ci-book" placeholder="e.g. The House on Mango Street"></div>'
      +'<div class="form-group"><label>Author</label><input id="ci-author" placeholder="e.g. Sandra Cisneros"></div>'
      +'<div class="form-group">'      +'<label>Your reading response</label>'      +'<div style="background:#0f1520;border:1px solid #2a3245;border-radius:8px;padding:0.65rem 0.85rem;margin-bottom:0.5rem;font-size:0.8rem;color:#8a9ab5;line-height:1.9">'      +'Write 4–5 sentences covering:<br>'      +'<span style="color:#e8c47a">✔</span> What\'s happening in the book right now<br>'      +'<span style="color:#e8c47a">✔</span> Something you <strong style="color:#f0e8d8">liked</strong><br>'      +'<span style="color:#e8c47a">✔</span> Something you <strong style="color:#f0e8d8">aren\'t sure about</strong> or found confusing<br>'      +'<span style="color:#e8c47a">✔</span> Something that <strong style="color:#f0e8d8">surprised</strong> you<br>'      +'<span style="color:#e8c47a">✔</span> How you\'re feeling about the book overall'      +'</div>'      +'<textarea id="ci-vibe" style="min-height:130px" placeholder="Write your response here..."></textarea>'      +'</div>'      +'<div style="display:flex;gap:12px">'
      +'<div class="form-group" style="flex:1"><label>Start page</label><input id="ci-page-start" type="number" min="1" placeholder="e.g. 45"></div>'
      +'<div class="form-group" style="flex:1"><label>End page</label><input id="ci-page-end" type="number" min="1" placeholder="e.g. 112"></div>'
      +'</div>'
      +'<div class="form-group"><label>Reading mood</label>'
      +'<select id="ci-mood">'
      +'<option value="love">🔥 Love it! Can\'t put it down.</option>'
      +'<option value="good">😄 It\'s good, I want to read it.</option>'
      +'<option value="ok">😐 It\'s ok, but I drift a little or have to be reminded.</option>'
      +'<option value="boring">💤 It\'s really boring, I need a new book.</option>'
      +'</select></div>'
      +'<button class="btn btn-primary" id="ci-submit" onclick="window._submitCheckin()">Post to the wall</button>'
      +'</div>';
  }
  return '<h2>Post an update</h2>'
    +'<div style="margin-bottom:1rem;font-size:0.85rem;color:#8a9ab5">Signed in as <strong style="color:#e8c47a">'+esc(state.currentUser.name)+'</strong> · <a href="#" onclick="window._signOut();return false;" style="color:#5a6275;text-decoration:none">switch</a></div>'
    +body;
}

function renderJournal(){
  if(!state.currentUser){
    return '<h2>My reading journal</h2>'
      +'<div class="card" style="text-align:center;padding:2rem">'
      +'<p style="color:#8a9ab5;margin-bottom:1rem">Sign in first via the Check-in tab.</p>'
      +'<button class="btn btn-primary" onclick="setTab(\'checkin\')">Go to check-in</button>'
      +'</div>';
  }
  const key=emailKey(state.currentUser.email);
  // Mark teacher replies as read
  if(state.hasUnreadReply){
    state.hasUnreadReply=false;
    dbUpdate('students/'+key,{lastJournalRead:Date.now()});
  }
  const dueBanner=state.journalDue
    ? '<div style="background:#1a2e1a;border:2px solid #4adb8a;border-radius:10px;padding:1rem;margin-bottom:1rem;font-size:0.88rem;color:#a8d4a8;line-height:1.6">'
      +'<strong style="color:#4adb8a">✏️ Journal entry due!</strong> You\'ve done two check-ins since your last journal entry. Write a few sentences to Mr. Powers below before your next check-in.'
      +'</div>'
    : '';
  const msgs=state.journals[key]?Object.values(state.journals[key]).sort((a,b)=>new Date(a.date)-new Date(b.date)):[];
  const thread=msgs.length
    ? msgs.map(m=>'<div><div class="msg-label">'+(m.role==='student'?esc(state.currentUser.name):'Mr. Powers')+' · '+fmt(m.date)+'</div>'
        +'<div class="msg '+(m.role==='student'?'msg-student':'msg-teacher')+'">'+esc(m.text)+'</div></div>').join('')
    : '<div class="empty" style="padding:1rem 0">Your conversation with Mr. Powers will appear here.</div>';
  return '<h2>My reading journal</h2>'
    +dueBanner
    +'<div class="card">'
    +'<p style="font-size:0.82rem;color:#8a9ab5;margin-bottom:1rem">Private — only you and Mr. Powers can see this.</p>'
    +'<div class="thread">'+thread+'</div>'
    +'<div class="form-group" style="margin-top:1rem"><label>Write to Mr. Powers</label>'
    +'<div style="margin-bottom:0.6rem">'
    +'<div style="font-size:0.78rem;color:#5a6275;margin-bottom:0.4rem;font-style:italic">Not sure what to write? Tap a starter:</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:6px">'
    +'<button class="starter-btn" onclick="window._useStarter(this)">Something this book made me think about outside of reading is…</button>'
    +'<button class="starter-btn" onclick="window._useStarter(this)">A question I keep coming back to is…</button>'
    +'<button class="starter-btn" onclick="window._useStarter(this)">The character I\'m most interested in right now is… because…</button>'
    +'<button class="starter-btn" onclick="window._useStarter(this)">I\'m surprised that I liked / didn\'t like this book because…</button>'
    +'<button class="starter-btn" onclick="window._useStarter(this)">Something I want to remember from this section is…</button>'
    +'<button class="starter-btn" onclick="window._useStarter(this)">This book reminds me of… because…</button>'
    +'<button class="starter-btn" onclick="window._useStarter(this)">If I could change one thing about the story so far, I would…</button>'
    +'</div></div>'
    +'<textarea id="jnl-msg" placeholder="Share a question, a reaction, something you noticed..."></textarea></div>'
    +'<button class="btn btn-primary" id="jnl-send" onclick="window._sendJournal()">Send message</button>'
    +'</div>';
}

function renderTeacher(){
  if(state.teacherLocked){
    return '<div class="lock"><h2>Teacher dashboard</h2>'
      +'<div class="form-group" style="width:100%;max-width:280px"><label>Password</label>'
      +'<input type="password" id="t-pass" placeholder="Enter password" onkeydown="if(event.key===\'Enter\')window._checkPass()"></div>'
      +'<button class="btn btn-primary" onclick="window._checkPass()">Sign in</button>'
      +'<div id="pass-err" style="color:#ff7c5c;font-size:0.82rem;display:none">Incorrect password</div>'
      +'</div>';
  }
  if(state.viewingStudent) return renderStudentView();
  return renderDashboard();
}

function renderDashboard(){
  const emails=Object.keys(state.students);
  const counts={current:0,overdue:0,never:0};
  emails.forEach(e=>counts[getStatus(state.students[e])]++);
  const rows=emails.length
    ? emails.sort((a,b)=>{const o={never:0,overdue:1,current:2};return o[getStatus(state.students[a])]-o[getStatus(state.students[b])];})
        .map(email=>{
          const s=state.students[email];
          const st=getStatus(s);
          const label=st==='current'?'✓ Current':st==='overdue'?'⚠ Overdue':'✗ Never';
          return '<div class="dash-row" onclick="window._viewStudent(\''+esc(email)+'\')">'
            +'<span class="dash-name">'+esc(s.name||email)+'</span>'
            +'<span class="dash-email">'+esc(email)+'</span>'
            +'<span class="dash-date">'+(s.lastCheckin?fmt(s.lastCheckin):'—')+'</span>'
            +'<span class="status-badge status-'+st+'">'+label+'</span>'
            +'</div>';
        }).join('')
    : '<div class="empty">No students yet. Import your roster to get started.</div>';

  return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem">'
    +'<h2 style="margin:0">Teacher dashboard</h2>'
    +'<div style="display:flex;gap:8px">'
    +'<button class="btn btn-secondary" onclick="window._toggleRoster()">Import roster</button>'
    +'<button class="btn btn-secondary" onclick="window._exportCSV()">Export CSV</button>'
    +'</div></div>'
    +'<div class="stats">'
    +'<div class="stat"><div class="stat-n">'+emails.length+'</div><div class="stat-l">Students</div></div>'
    +'<div class="stat"><div class="stat-n" style="color:#4adb8a">'+counts.current+'</div><div class="stat-l">Current</div></div>'
    +'<div class="stat"><div class="stat-n" style="color:#e8a42a">'+counts.overdue+'</div><div class="stat-l">Overdue</div></div>'
    +'<div class="stat"><div class="stat-n" style="color:#ff7c5c">'+counts.never+'</div><div class="stat-l">Never</div></div>'
    +'</div>'
    +'<div id="roster-panel" style="display:none">'
    +'<div class="card" style="margin-bottom:1rem">'
    +'<h3 style="margin-bottom:0.5rem">Import student roster</h3>'
    +'<p style="font-size:0.82rem;color:#8a9ab5;margin-bottom:0.75rem;line-height:1.5">One student per line: <code style="background:#0f1520;padding:0.1rem 0.35rem;border-radius:4px;font-size:0.8rem">First Last, email@nicholsschool.org</code></p>'
    +'<div class="form-group"><textarea id="roster-input" style="min-height:130px;font-family:monospace;font-size:0.82rem" placeholder="Jordan Kim, jkim@nicholsschool.org"></textarea></div>'
    +'<div style="display:flex;gap:8px">'
    +'<button class="btn btn-primary" onclick="window._importRoster()">Import</button>'
    +'<button class="btn btn-secondary" onclick="window._toggleRoster()">Cancel</button>'
    +'</div>'
    +'<div id="roster-result" style="margin-top:0.75rem;font-size:0.82rem;color:#4adb8a;display:none"></div>'
    +'</div></div>'
    +'<div class="card">'
    +'<div style="display:flex;gap:8px;font-size:0.75rem;color:#5a6275;padding-bottom:0.5rem;border-bottom:1px solid #1a2235;font-weight:500;text-transform:uppercase;letter-spacing:0.05em">'
    +'<span style="flex:1">Name</span><span class="dash-email" style="flex:1.5">Email</span><span style="flex:1">Last check-in</span><span style="width:95px;text-align:right">Status</span>'
    +'</div>'+rows+'</div>';
}

function renderStudentView(){
  const email=state.viewingStudent;
  const s=state.students[email]||{name:email,email};
  const key=emailKey(email);
  const msgs=state.journals[key]?Object.values(state.journals[key]).sort((a,b)=>new Date(a.date)-new Date(b.date)):[];
  const posts=state.posts.filter(p=>p.email===email);
  const fu=state.followups[key]||null;
  const st=getStatus(s);
  const stLabel=st==='current'?'✓ Current':st==='overdue'?'⚠ Overdue':'✗ Never checked in';
  const postRows=posts.length
    ? posts.map(p=>'<div style="padding:0.65rem 0;border-bottom:1px solid #1a2235">'
        +'<div style="font-size:0.85rem;font-weight:500">'+esc(p.book)+'</div>'
        +'<div style="font-size:0.82rem;color:#8a9ab5;font-style:italic;margin:2px 0">"'+esc(p.vibe)+'"</div>'
        +'<div style="font-size:0.75rem;color:#5a6275">'+fmt(p.date)+' · by '+esc(p.author||'unknown')+' · pp. '+(p.pageStart||'?')+'-'+(p.pageEnd||'?')+' ('+(p.pagesRead||0)+' pages)'+' · '+p.mood+'</div>'
        +'</div>').join('')
    : '<div style="color:#5a6275;font-size:0.85rem;padding:0.5rem 0">No posts yet.</div>';
  const threadRows=msgs.length
    ? msgs.map(m=>'<div><div class="msg-label">'+(m.role==='student'?esc(s.name||email):'You')+' · '+fmt(m.date)+'</div>'
        +'<div class="msg '+(m.role==='student'?'msg-student':'msg-teacher')+'">'+esc(m.text)+'</div></div>').join('')
    : '<div style="color:#5a6275;font-size:0.85rem;padding:0.5rem 0">No messages yet.</div>';
  const fuBlock=fu
    ? '<div class="card" style="margin-bottom:1rem">'
      +'<h3 style="margin-bottom:0.5rem;color:#8a9ab5;font-size:0.8rem;text-transform:uppercase;letter-spacing:0.05em">Follow-up Q&amp;A</h3>'
      +'<div style="font-size:0.88rem;color:#e8c47a;margin-bottom:0.5rem">'+esc(fu.question)+'</div>'
      +(fu.answered?'<div style="font-size:0.88rem;color:#c9b99a;background:#0f1520;padding:0.65rem;border-radius:8px;line-height:1.6">'+esc(fu.answer)+'</div>'
        :'<div style="font-size:0.82rem;color:#ff7c5c;font-style:italic">Not yet answered</div>')
      +'</div>'
    : '';
  return '<div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1.25rem">'
    +'<button class="btn btn-secondary" onclick="window._backToDash()">← Back</button>'
    +'<div><h3>'+esc(s.name||email)+'</h3>'
    +'<div style="font-size:0.8rem;color:#8a9ab5">'+esc(email)+' · <span class="status-badge status-'+st+'">'+stLabel+'</span></div>'
    +'</div></div>'
    +'<div class="card" style="margin-bottom:1rem">'
    +'<h3 style="margin-bottom:0.75rem;color:#8a9ab5;font-size:0.8rem;text-transform:uppercase;letter-spacing:0.05em">Wall posts ('+posts.length+')</h3>'
    +postRows+'</div>'
    +fuBlock
    +'<div class="card">'
    +'<h3 style="margin-bottom:0.75rem;color:#8a9ab5;font-size:0.8rem;text-transform:uppercase;letter-spacing:0.05em">Journal thread</h3>'
    +'<div class="thread">'+threadRows+'</div>'
    +'<div class="form-group" style="margin-top:1rem"><label>Reply to '+esc(s.name||email)+'</label>'
    +'<textarea id="t-reply" placeholder="Write a personal response..."></textarea></div>'
    +'<button class="btn btn-primary" onclick="window._teacherReply(\''+esc(email)+'\')">Send reply</button>'
    +'</div>';
}

// ── ACTIONS (exposed to window so onclick handlers work in module scope) ──────
window._signIn = async function(){
  const name=document.getElementById('fi-name')?.value.trim();
  const email=document.getElementById('fi-email')?.value.trim().toLowerCase();
  if(!name||!email||!email.includes('@')){ alert('Please enter your name and a valid email.'); return; }
  state.currentUser={name,email};
  localStorage.setItem('sr_user',JSON.stringify(state.currentUser));
  const key=emailKey(email);
  const snap=await get(ref(db,'students/'+key));
  if(!snap.exists()){
    await dbSet('students/'+key,{name,lastCheckin:null,roster:false,journalDue:false});
  } else {
    // Restore journalDue state from Firebase
    const sData=snap.val();
    state.journalDue = sData.journalDue||false;
  }
  // Check for unread teacher replies
  await checkUnreadReply(email);
  render();
};

window._signOut = function(){ state.currentUser=null; localStorage.removeItem('sr_user'); render(); };

window._submitCheckin = async function(){
  const book=document.getElementById('ci-book')?.value.trim();
  const author=document.getElementById('ci-author')?.value.trim();
  const vibe=document.getElementById('ci-vibe')?.value.trim();
  const pageStart=parseInt(document.getElementById('ci-page-start')?.value)||0;
  const pageEnd=parseInt(document.getElementById('ci-page-end')?.value)||0;
  const mood=document.getElementById('ci-mood')?.value;
  if(!book||!author){ alert('Please enter the book title and author.'); return; }
  if(!vibe||vibe.trim().length<80){ alert('Please write a fuller response — aim for 4–5 sentences covering what you liked, what surprised you, and what you\'re unsure about.'); return; }
  if(!pageStart||!pageEnd){ alert('Please enter your start and end page numbers.'); return; }
  if(pageEnd<=pageStart){ alert('End page must be greater than start page.'); return; }
  const btn=document.getElementById('ci-submit');
  if(btn){ btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Posting...'; }
  const pagesRead=pageEnd-pageStart;
  const post={email:state.currentUser.email,name:state.currentUser.name,book,author,vibe,pageStart,pageEnd,pagesRead,mood,date:new Date().toISOString()};
  await dbPush('posts',post);
  await dbUpdate('students/'+emailKey(state.currentUser.email),{lastCheckin:post.date,name:state.currentUser.name});
  const bloomPrompt='A rising 8th grader submitted this reading response for "'+book+'" by '+author+', pages '+pageStart+'-'+pageEnd+':\n\n'+vibe+'\n\nYour job: generate ONE follow-up question using this two-step process:\n\nSTEP 1 - Assess quality:\n- VAGUE: generic statements, plot summary only, no personal reaction, fewer than 3 of the 5 prompts addressed (liked / unsure / surprised / whats happening / overall feeling)\n- SUBSTANTIVE: specific textual details, genuine personal reaction, addresses most prompts with real thought\n\nSTEP 2 - Choose your question type:\n- If VAGUE: push for specificity. Ask them to name a specific moment, line, character action, or detail. e.g. You said you liked it - what specific moment made you feel that, and why did it stand out?\n- If SUBSTANTIVE: ask a question one level up Blooms Taxonomy. Describing or remembering -> ask to analyze. Analyzing -> ask to evaluate or judge. Evaluating -> ask to connect or create. e.g. What do you think the author is trying to say about the theme they mentioned? or If you were this character would you have made the same choice, and what does your answer say about the books values?\n\nWrite ONLY the question. No preamble, no label, no explanation. 1-3 sentences. Be warm and genuinely curious, not test-like.';
  const q=await callClaude(bloomPrompt,'You are an experienced middle school English teacher skilled in Blooms Taxonomy who runs Socratic seminars. Push students toward deeper thinking without making them feel interrogated.');
  if(q){
    const fuData={question:q.trim(),answered:false,answer:null,postDate:post.date};
    await dbSet('followups/'+emailKey(state.currentUser.email),fuData);
    state.pendingFollowup={question:q.trim(),email:state.currentUser.email};
  }
  // Check if journal entry is due (every 2 posts)
  // Re-fetch posts from Firebase to get accurate count including the one just submitted
  const journalKey=emailKey(state.currentUser.email);
  const freshSnap=await get(ref(db,'posts'));
  const allPosts=freshSnap.exists()?Object.values(freshSnap.val()):[];
  const allStudentPosts=allPosts.filter(p=>p.email===state.currentUser.email);
  const journalMsgs=state.journals[journalKey]?Object.values(state.journals[journalKey]):[];
  const studentJournalMsgs=journalMsgs.filter(m=>m.role==='student');
  const lastJournalDate=studentJournalMsgs.length?Math.max(...studentJournalMsgs.map(m=>new Date(m.date).getTime())):0;
  const postsSinceJournal=allStudentPosts.filter(p=>new Date(p.date).getTime()>lastJournalDate).length;
  const isDue = postsSinceJournal>0 && postsSinceJournal%2===0;
  state.journalDue = isDue;
  // Persist journalDue to Firebase so it shows on next visit
  await dbUpdate('students/'+journalKey,{journalDue:isDue});
  setTab('wall');
};

window._submitFollowup = async function(){
  const ans=document.getElementById('fu-answer')?.value.trim();
  if(!ans||ans.length<15){ alert('Please write a real answer.'); return; }
  await dbUpdate('followups/'+emailKey(state.currentUser.email),{answered:true,answer:ans});
  state.pendingFollowup=null;
  render();
};

window._submitPendingFollowup = async function(){
  const ans=document.getElementById('pf-answer')?.value.trim();
  if(!ans||ans.length<15){ alert('Please write a real answer — at least a couple of sentences.'); return; }
  const btn=document.querySelector('#pf-answer + div button, .btn-primary');
  // Write answer - use set to guarantee the full record is written
  const email=state.currentUser.email;
  const key=emailKey(email);
  const pf=state.pendingFollowup;
  await dbUpdate('followups/'+key,{answered:true,answer:ans,answeredDate:new Date().toISOString()});
  // Verify it was written
  const snap=await get(ref(db,'followups/'+key));
  if(snap.exists()&&snap.val().answered){
    console.log('Follow-up answer confirmed in Firebase');
  } else {
    console.warn('Follow-up write may have failed, retrying...');
    await dbSet('followups/'+key,{question:pf.question,answered:true,answer:ans,postDate:pf.postDate||'',answeredDate:new Date().toISOString()});
  }
  state.pendingFollowup=null;
  render();
};

window._dismissFollowup = function(){
  state.pendingFollowup=null;
  render();
};

window._useStarter = function(btn){
  const ta=document.getElementById('jnl-msg');
  if(!ta) return;
  const text=btn.textContent.trim();
  // If textarea is empty or ends with whitespace, set; otherwise append on new line
  if(!ta.value.trim()){
    ta.value=text+' ';
  } else {
    ta.value=ta.value.trimEnd()+'\n\n'+text+' ';
  }
  ta.focus();
  ta.setSelectionRange(ta.value.length,ta.value.length);
  // Visually mark the starter as used
  btn.style.borderColor='#e8c47a';
  btn.style.color='#e8c47a';
  btn.style.background='#2a2010';
};

window._sendJournal = async function(){
  const txt=document.getElementById('jnl-msg')?.value.trim();
  if(!txt) return;
  const btn=document.getElementById('jnl-send');
  if(btn){ btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Sending...'; }
  await dbPush('journals/'+emailKey(state.currentUser.email),{role:'student',text:txt,date:new Date().toISOString()});
  state.journalDue=false;
  await dbUpdate('students/'+emailKey(state.currentUser.email),{journalDue:false});
  render();
};

window._teacherReply = async function(email){
  const txt=document.getElementById('t-reply')?.value.trim();
  if(!txt) return;
  await dbPush('journals/'+emailKey(email),{role:'teacher',text:txt,date:new Date().toISOString()});
  renderMain();
};

window._checkPass = function(){
  const v=document.getElementById('t-pass')?.value;
  if(v===TEACHER_PASS){ state.teacherLocked=false; render(); }
  else{ const e=document.getElementById('pass-err'); if(e) e.style.display='block'; }
};

window._viewStudent = function(email){ state.viewingStudent=email; renderMain(); };
window._backToDash = function(){ state.viewingStudent=null; renderMain(); };
window._toggleRoster = function(){
  const p=document.getElementById('roster-panel');
  if(p) p.style.display=p.style.display==='none'?'block':'none';
};

window._importRoster = async function(){
  const raw=document.getElementById('roster-input')?.value.trim();
  if(!raw){ alert('Paste some names/emails first.'); return; }
  const lines=raw.split('\n').map(l=>l.trim()).filter(Boolean);
  let added=0,skipped=0;
  for(const line of lines){
    let name='',email='';
    if(line.includes(',')){
      const parts=line.split(',').map(p=>p.trim());
      name=parts[0]; email=(parts[1]||'').toLowerCase();
    } else if(line.includes('@')){
      email=line.toLowerCase();
      name=email.split('@')[0].replace(/\./g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    } else { skipped++; continue; }
    if(!email||!email.includes('@')){ skipped++; continue; }
    const key=emailKey(email);
    const snap=await get(ref(db,'students/'+key));
    if(!snap.exists()){ await dbSet('students/'+key,{name,lastCheckin:null,roster:true}); added++; }
    else skipped++;
  }
  const res=document.getElementById('roster-result');
  if(res){ res.style.display='block'; res.textContent='Added '+added+' student'+(added!==1?'s':'')+'.'+(skipped?' '+skipped+' skipped.':''); }
  setTimeout(()=>{ if(res) res.style.display='none'; },4000);
};

window._exportCSV = function(){
  // Sheet 1: one row per post
  const postRows=[['Student Name','Email','Date','Book Title','Author','Start Page','End Page','Pages Read','Vibe','Mood','Follow-up Question','Follow-up Answered','Follow-up Response']];
  const sortedPosts=[...state.posts].sort((a,b)=>a.email.localeCompare(b.email)||new Date(a.date)-new Date(b.date));
  sortedPosts.forEach(p=>{
    const fu=state.followups[emailKey(p.email)];
    const fuForPost=fu&&fu.postDate===p.date?fu:null;
    postRows.push([
      p.name||p.email, p.email, fmt(p.date),
      p.book||'', p.author||'',
      p.pageStart||'', p.pageEnd||'', p.pagesRead||'',
      p.vibe||'', p.mood||'',
      fuForPost?fuForPost.question:'',
      fuForPost?(fuForPost.answered?'Yes':'No'):'',
      fuForPost&&fuForPost.answered?fuForPost.answer:''
    ]);
  });
  // Sheet 2: one row per student summary
  const summaryRows=[['',''],['STUDENT SUMMARY',''],['Name','Email','Status','Total Posts','Total Pages Read','Last Check-in','Follow-up Complete']];
  Object.keys(state.students).sort().forEach(email=>{
    const s=state.students[email];
    const posts=state.posts.filter(p=>p.email===email);
    const totalPages=posts.reduce((sum,p)=>sum+(p.pagesRead||0),0);
    const fu=state.followups[emailKey(email)];
    summaryRows.push([s.name||email,email,getStatus(s),posts.length,totalPages,s.lastCheckin?fmt(s.lastCheckin):'Never',fu?(fu.answered?'Yes':'No'):'N/A']);
  });
  const allRows=[...postRows,...summaryRows];
  const csv=allRows.map(r=>r.map(c=>'"'+String(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='summer_reading_tracker.csv';
  a.click();
};

const TABS=[{id:'wall',label:'Reading Wall'},{id:'checkin',label:'Check-in'},{id:'journal',label:'My Journal'},{id:'teacher',label:'Teacher'}];
function setTab(id){ state.tab=id; state.viewingStudent=null; render(); }
window.setTab=setTab;

function renderMain(){
  const main=document.getElementById('main');
  if(!main) return;
  if(state.tab==='wall') main.innerHTML=renderWall();
  else if(state.tab==='checkin') main.innerHTML=renderCheckin();
  else if(state.tab==='journal') main.innerHTML=renderJournal();
  else if(state.tab==='teacher') main.innerHTML=renderTeacher();
}

function render(){
  document.getElementById('nav').innerHTML=TABS.map(t=>'<button class="nav-btn'+(state.tab===t.id?' active':'')+'" onclick="setTab(\''+t.id+'\')">'+t.label+'</button>').join('');
  document.getElementById('teacher-status').innerHTML=!state.teacherLocked?'<span style="font-size:0.78rem;color:#4adb8a">● Teacher mode</span>':'';
  renderMain();
}

startListeners();
render();
</script>
